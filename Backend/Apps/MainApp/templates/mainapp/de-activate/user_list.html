{% load static %}

{% block title %}

{% endblock %}

{% block content %}

<!-- Include Bootstrap CSS and DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap4.min.css">

<div class="container">
    <div class="row justify-content-center">
        <div class="mt-4"> <!-- Changed col-md-10 to col-md-12 for more width -->
            <!-- Deactivate All Button -->
            <div class="mb-3 text-right">
                <button id="deactivate-all-btn" class="btn btn-danger" disabled>Deactivate Selected</button>
            </div>

            <!-- Table to display users -->
            <div class="table-responsive">
                <table id="users-table" class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>
                                <!-- Select All Checkbox -->
                                <input type="checkbox" id="select-all-checkbox">
                            </th>
                            <th>User Name</th>
                            <th>Last Login</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                            <tr>
                                <td>
                                    <!-- Checkbox for selecting the row -->
                                    <input type="checkbox" class="user-checkbox" data-username="{{ user.username }}">
                                </td>
                                <td>{{ user.username }}</td>
                                <td>{{ user.last_login|date:"Y-m-d H:i:s" }}</td>
                                <td>
                                    <!-- Deactivate Button -->
                                    <button class="btn btn-warning btn-sm deactivate-btn" data-username="{{ user.username }}">Deactivate</button>
                                </td>
                            </tr>
                        {% empty %}
                            <tr>
                                <td colspan="4">No users found</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Include jQuery, Bootstrap JS, and DataTables JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap4.min.js"></script>

<!-- Include the external JavaScript file -->


<!-- Custom CSS to adjust column widths and table width -->
<style>
    #users-table {
        width: 100%; /* Ensure the table takes up the full width of the container */
    }

    #users-table th, #users-table td {
        text-align: center;
        white-space: nowrap;
    }

    #users-table th:first-child, #users-table td:first-child {
        width: 10%; /* Adjust width for the Select column */
    }

    #users-table th:nth-child(2), #users-table td:nth-child(2) {
        width: 30%; /* Adjust width for the User Name column */
    }

    #users-table th:nth-child(3), #users-table td:nth-child(3) {
        width: 40%; /* Adjust width for the Last Login column */
    }

    #users-table th:nth-child(4), #users-table td:nth-child(4) {
        width: 20%; /* Adjust width for the Action column */
    }

    .dataTables_paginate,
    .dataTables_info {
        display: none !important;
    }
</style>

{% endblock %}
