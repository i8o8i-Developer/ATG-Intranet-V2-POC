{% extends "mainapp/base.html" %}

{% block title %}
Hierarchy
{% endblock %}

{% block styling %}
{% if pos == 'Developer' %}
[node-id='{{count}}'] rect {
    fill: #750000;
}
{% endif %}
{% endblock %}
{% block Hierarchy %}

{% load static %}
<script src="{% static "orgchart.js" %}"></script>
<div id="tree" style="margin-bottom: 22%;">
</div>

</div>
<script type="text/javascript" class="container">

        var chart = new OrgChart(document.getElementById("tree"), {
            nodeMouseClick: OrgChart.action.expandCollapse,

            template:"mila",
            enableSearch: true,


            mouseScrool: OrgChart.action.none,
            nodeBinding: {
                field_0: "name",
                field_1: "title",
                field_2: "Designation",
                img_0: "img"
            },
            {% if loggedin_user == 'bassi' %}
            collapse: {
                level: 2,
                allChildren: true
            },

            {% elif pos != 'Developer' %}
            collapse: {
                level: 3,
                allChildren: true
            },


            {% endif %}
            onClick: function (sender, data) {
            return data.text == "YES" || data.text == "NO";
        },
        onExpCollClick: function (sender, action, id, ids) {
            if (action == OrgChart.EXPAND) {
                var node = sender.getBGNode(id);
                if (node.parent) {
                    sender.expand(id, ids, function () {
                        sender.expand(ids[0], sender.getBGNode(ids[0]).childrenIds, function () {
                            var ids = [];
                            for (var i = 0; i < node.parent.childrenIds.length; i++) {
                                var firstLevelChildId = node.parent.childrenIds[i];
                                if (firstLevelChildId != node.id) {
                                    ids.push(firstLevelChildId);
                                }
                            }

                            sender.collapse(id, ids, function () {
                                sender.center(id);
                            });
                        });

                    });

                    return false;
                }
            }
            if (action == OrgChart.COLLAPSE) {
                var node = sender.getBGNode(id);
                if (node.parent) {
                    ids = [];
                    function collapseIds(n) {
                        if (n) {
                            for (var i = 0; i < n.childrenIds.length; i++) {
                                ids.push(n.childrenIds[i]);
                                collapseIds(sender.getBGNode(n.childrenIds[i]));
                            }
                        }
                    }
                    collapseIds(node);
                    sender.collapse(id, ids, function () {
                        sender.expand(id, node.parent.collapsedChildrenIds, function () {
                            sender.center(id);
                        });
                    });
                    return false;
                }
            }
        },

            nodes: [

                {% if loggedin_user == 'bassi' %}
                { id: 0, name: "bassi", title: "Manager", img: "https://cdn.balkan.app/shared/empty-img-blue.svg" },



                {% else %}
                { id: -1, name: "bassi", title: "Manager", img: "https://cdn.balkan.app/shared/empty-img-blue.svg" },
                { id: 0, name: "{{manager}}", pid:-1,title: "Manager", img: "https://cdn.balkan.app/shared/empty-img-blue.svg" },




                {% endif %}

                {% for manager_data in all_data %}
                {% if pos == 'Developer' %}

                { id: {{iterator.next}}, pid: 0, name: "{{manager_data.manager_name}}", title: "{{manager_data.manager_dept_name}}", img: "https://cdn.balkan.app/shared/empty-img-blue.svg",Designation:"Manager"},
                {% else %}

                { id: {{iterator.next}}, pid: 0, name: "{{manager_data.manager_dept_name}}", title: "Department",Designation:"Department"},
                {% endif %}
                {% with pid=iterator.current %}
                {% for xuser in manager_data.manager_dept %}
                { id: {{iterator.next}}, pid: {{pid}}, name: "{{xuser.uname}}", title: "{{xuser.employee_position}}", img: "https://cdn.balkan.app/shared/empty-img-blue.svg"},
                    {% if xuser.product %}

                    {% with piiid=iterator.current %}
                        {% for manager_data in xuser.product %}

                        {% if pos == 'Developer' %}


                        { id: {{iterator.next}}, pid: {{piiid}}, name: "{{manager_data.manager_name}}", title: "{{manager_data.manager_dept_name}}", img: "https://cdn.balkan.app/shared/empty-img-blue.svg",Designation:"Manager"},
                        {% else %}

                        { id: {{iterator.next}}, pid: {{piiid}}, name: "{{manager_data.manager_dept_name}}", title: "Department",Designation:"Department"},
                        {% endif %}
                        {% with piid=iterator.current %}
                        {% for xuser in manager_data.manager_dept %}
                        { id: {{iterator.next}}, pid: {{piid}}, name: "{{xuser.uname}}", title: "{{xuser.employee_position}}", img: "https://cdn.balkan.app/shared/empty-img-blue.svg"},

                        {% endfor %}
                        {% endwith %}

                        {% endfor %}
                        {% endwith %}

                    {% endif %}
                {% endfor %}
                {% endwith %}
                {% endfor %}
                /*
                { id: 2, pid: 1, name: "Ava Field", title: "IT Manager", img: "https://cdn.balkan.app/shared/empty-img-blue.svg"},
                { id: 3, pid: 1, name: "Rhys Harper", img: "https://cdn.balkan.app/shared/empty-img-blue.svg" }
                */
            ]
            {% if xuser.product %}

                    {% endif %}
        });
</script>
{% endblock %}
