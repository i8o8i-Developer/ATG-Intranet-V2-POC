name: intranet-v2

services:
  Database:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "6758:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intranet_rebuild}
      POSTGRES_USER: ${POSTGRES_USER:-intranet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intranet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-intranet} -d $${POSTGRES_DB:-intranet_rebuild}"]
      interval: 5s
      timeout: 5s
      retries: 20

  Redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "9876:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  Backend-Init:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: intranet-v2-backend
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        echo "Starting Initialization..."
        python Backend/manage.py migrate --noinput
        if [ "$${SEED_DEMO_DATA:-1}" = "1" ]; then
          echo "Running Seed Demo Erp..."
          python Backend/manage.py Seed_Demo_Erp --tenant "$${BOOTSTRAP_TENANT}" --workspace "$${BOOTSTRAP_WORKSPACE}" --username "$${BOOTSTRAP_USERNAME}" --password "$${BOOTSTRAP_PASSWORD}" --email "$${BOOTSTRAP_EMAIL}" --first-name "$${BOOTSTRAP_FIRST_NAME}" --last-name "$${BOOTSTRAP_LAST_NAME}" --display-name "$${BOOTSTRAP_DISPLAY_NAME}" --employee-code "$${BOOTSTRAP_EMPLOYEE_CODE}"
        else
          echo "Running Bootstrap Backend..."
          python Backend/manage.py Bootstrap_Backend --tenant "$${BOOTSTRAP_TENANT}" --workspace "$${BOOTSTRAP_WORKSPACE}" --username "$${BOOTSTRAP_USERNAME}" --password "$${BOOTSTRAP_PASSWORD}" --email "$${BOOTSTRAP_EMAIL}" --first-name "$${BOOTSTRAP_FIRST_NAME}" --last-name "$${BOOTSTRAP_LAST_NAME}" --display-name "$${BOOTSTRAP_DISPLAY_NAME}" --employee-code "$${BOOTSTRAP_EMPLOYEE_CODE}"
        fi
        echo "Initialization Successful."
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-Rebuild-Development-Only}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4787,http://127.0.0.1:4787}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:4787,http://127.0.0.1:4787,http://localhost:5466,http://127.0.0.1:5466}
      POSTGRES_DB: ${POSTGRES_DB:-intranet_rebuild}
      POSTGRES_USER: ${POSTGRES_USER:-intranet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intranet}
      POSTGRES_HOST: Database
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://Redis:6379/0
      CELERY_RESULT_BACKEND: redis://Redis:6379/0
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5466}
      BOOTSTRAP_TENANT: "${BOOTSTRAP_TENANT:-Banao}"
      BOOTSTRAP_WORKSPACE: "${BOOTSTRAP_WORKSPACE:-Default Workspace}"
      BOOTSTRAP_USERNAME: "${BOOTSTRAP_USERNAME:-AtgIntranet}"
      BOOTSTRAP_PASSWORD: "${BOOTSTRAP_PASSWORD:-TestBuildAtgIntranet1608}"
      BOOTSTRAP_EMAIL: "${BOOTSTRAP_EMAIL:-admin@atgintranet.in}"
      BOOTSTRAP_FIRST_NAME: "${BOOTSTRAP_FIRST_NAME:-Atg}"
      BOOTSTRAP_LAST_NAME: "${BOOTSTRAP_LAST_NAME:-Intranet}"
      BOOTSTRAP_DISPLAY_NAME: "${BOOTSTRAP_DISPLAY_NAME:-Atg Intranet}"
      BOOTSTRAP_EMPLOYEE_CODE: "${BOOTSTRAP_EMPLOYEE_CODE:-EMP-001}"
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-1}
    volumes:
      - backend_media:/app/Backend/media
    depends_on:
      Database:
        condition: service_healthy
      Redis:
        condition: service_healthy

  Backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: intranet-v2-backend
    restart: unless-stopped
    command: python Backend/manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-Rebuild-Development-Only}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4787,http://127.0.0.1:4787}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:4787,http://127.0.0.1:4787,http://localhost:5466,http://127.0.0.1:5466}
      POSTGRES_DB: ${POSTGRES_DB:-intranet_rebuild}
      POSTGRES_USER: ${POSTGRES_USER:-intranet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intranet}
      POSTGRES_HOST: Database
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://Redis:6379/0
      CELERY_RESULT_BACKEND: redis://Redis:6379/0
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5466}
    ports:
      - "5466:8000"
    volumes:
      - backend_media:/app/Backend/media
    depends_on:
      Database:
        condition: service_healthy
      Redis:
        condition: service_healthy
      Backend-Init:
        condition: service_completed_successfully

  Celery-Worker:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: intranet-v2-celery-worker
    restart: unless-stopped
    command: celery -A Backend.celery_app worker -l info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-Rebuild-Development-Only}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      POSTGRES_DB: ${POSTGRES_DB:-intranet_rebuild}
      POSTGRES_USER: ${POSTGRES_USER:-intranet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intranet}
      POSTGRES_HOST: Database
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://Redis:6379/0
      CELERY_RESULT_BACKEND: redis://Redis:6379/0
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5466}
    volumes:
      - backend_media:/app/Backend/media
    depends_on:
      Backend-Init:
        condition: service_completed_successfully
      Redis:
        condition: service_healthy

  Celery-Beat:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: intranet-v2-celery-beat
    restart: unless-stopped
    command: celery -A Backend.celery_app beat -l info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-Rebuild-Development-Only}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      POSTGRES_DB: ${POSTGRES_DB:-intranet_rebuild}
      POSTGRES_USER: ${POSTGRES_USER:-intranet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intranet}
      POSTGRES_HOST: Database
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://Redis:6379/0
      CELERY_RESULT_BACKEND: redis://Redis:6379/0
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5466}
    depends_on:
      Backend-Init:
        condition: service_completed_successfully
      Redis:
        condition: service_healthy

  Frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: intranet-v2-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5466/}
    ports:
      - "4787:5173"
    volumes:
      - frontend_node_modules:/app/node_modules
    depends_on:
      Backend:
        condition: service_started


volumes:
  postgres_data:
  backend_media:
  frontend_node_modules: